<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Help Arrival/Departure</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #FFF7EE;
      --card:   #FFFFFF;
      --teal:   #2A9D8F;
      --teal2:  #1F7A6E;
      --orange: #E76F51;
      --orange2:#C25C41;
      --green:  #4CAF50;
      --yellow: #F4A200;
      --red:    #E53935;
      --text:   #1E1E1E;
      --muted:  #888;
      --border: #EAE0D5;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
    }

    header {
      background: var(--teal);
      color: #fff;
      text-align: center;
      padding: 24px 20px 20px;
    }
    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .header-title img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 2.1rem; font-weight: 900; }
    header p  { font-size: 1.1rem; margin-top: 8px; opacity: 0.85; }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 22px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border-radius: 22px;
      border: 1.5px solid var(--border);
      box-shadow: 0 4px 18px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .card-head {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 17px 20px 13px;
      border-bottom: 1.5px solid var(--border);
    }
    .card-head .ico { font-size: 1.7rem; }
    .card-head h2  { font-size: 1.4rem; font-weight: 800; color: var(--teal2); }
    .card-body { padding: 18px 20px; }

    .s-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 13px 14px;
      border-radius: 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      margin-bottom: 10px;
    }
    .s-row:last-of-type { margin-bottom: 0; }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
      background: #ccc;
    }
    .dot.green  { background: var(--green);  box-shadow: 0 0 0 4px rgba(76,175,80,0.18); }
    .dot.yellow { background: var(--yellow); box-shadow: 0 0 0 4px rgba(244,162,0,0.18); }
    .dot.red    { background: var(--red);    box-shadow: 0 0 0 4px rgba(229,57,53,0.18); }

    .s-label { font-size: 1.2rem; font-weight: 800; line-height: 1.2; }
    .s-value { font-size: 1.05rem; color: var(--muted); margin-top: 3px; font-weight: 600; }

    .big-btn {
      display: block;
      width: 100%;
      padding: 22px 16px;
      border: none;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      line-height: 1.2;
      box-shadow: 0 5px 18px rgba(0,0,0,0.16);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .big-btn:active { transform: scale(0.97); }
    .big-btn.teal   { background: linear-gradient(140deg, #2A9D8F, #1A7A6E); }
    .big-btn.orange { background: linear-gradient(140deg, #E76F51, #C25C41); }
    .big-btn small {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      opacity: 0.88;
      margin-top: 5px;
    }

    #refresh-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: #EDE5DA;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--teal2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #refresh-btn:active { background: #DDD5C8; }

    #refresh-icon { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.7s linear infinite; }

    #updated {
      text-align: center;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 700;
    }

    /* Subtle reconnecting notice — shown only after several failures */
    #reconnect-notice {
      display: none;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--orange);
      padding: 6px 0 0;
    }

    .msg { font-size: 1.15rem; color: var(--muted); text-align: center; padding: 8px 0; font-weight: 700; }
  </style>
</head>

  <h1>Help Arrival/Departure</h1>
  </div>
  <p>Logging in/out times with button pushes</p>
</header>

<main>

  <div class="card">
    <div class="card-head">
      <span class="ico">📡</span>
      <h2>Current Status</h2>
    </div>
    <div class="card-body" id="status-body">
      <p class="msg">⏳ Loading…</p>
    </div>
    <p id="reconnect-notice">⚠️ Reconnecting…</p>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="ico">🖥️</span>
      <h2>Full Dashboard</h2>
    </div>
    <div class="card-body">
      <a href="https://contact.nogginconsultingllc.com" target="_blank" class="big-btn teal">
        Open Live Dashboard
        <small>Tap to open the full status page →</small>
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="ico">📋</span>
      <h2>Google Sheets Log</h2>
    </div>
    <div class="card-body">
      <a href="https://docs.google.com/spreadsheets/d/1k-Udg5-Bh3tfAWll9JYOF8ZsHgzn1rFj5x6It2qxp6Q/edit" target="_blank" class="big-btn orange">
        Open Google Sheets Log
        <small>Tap to see all arrival &amp; departure times →</small>
      </a>
    </div>
  </div>

  <p id="updated"></p>

</main>

<script>
  const API = 'https://contact.nogginconsultingllc.com/api/state';
  const FAIL_THRESHOLD = 5;   // show error only after this many consecutive failures
  let failCount = 0;
  let hasGoodData = false;

  async function fetchStatus() {
    try {
      const res = await fetch(API, { cache: 'no-store' });
      if (!res.ok) throw new Error('bad response');
      const d = await res.json();
      failCount = 0;
      hasGoodData = true;
      document.getElementById('reconnect-notice').style.display = 'none';
      renderStatus(d);
    } catch (e) {
      failCount++;
      if (hasGoodData && failCount < FAIL_THRESHOLD) {
        // Keep last good data visible; just show a subtle reconnecting notice
        document.getElementById('reconnect-notice').style.display = 'block';
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('updated').textContent = 'Last updated at ' + now + ' — reconnecting…';
      } else if (failCount >= FAIL_THRESHOLD) {
        // Wipe screen after several consecutive failures; re-render each cycle so count updates
        document.getElementById('reconnect-notice').style.display = 'none';
        showError();
      }
    }
  }

  function renderStatus(d) {
    const s = d.session || {};
    const w = d.wifi   || {};
    const rows = [];

    // Visitor session state
    const isIn = s.waiting_for === 'departure';
    rows.push({
      dot: isIn ? 'green' : 'yellow',
      label: isIn ? '✅ Has arrived, waiting for departure button push' : '⏳ Waiting for arrival button push',
      value: isIn
        ? (s.arrived_at ? 'Arrived at ' + s.arrived_at : '⏳ Waiting for departure button push')
        : (s.last_departed_at ? 'Last left at ' + s.last_departed_at : 'Waiting for arrival button push')
    });

    // Last visit duration
    if (s.last_duration) {
      rows.push({
        dot: 'green',
        label: '🕐 Last Visit Length',
        value: s.last_duration
      });
    }

    // Last departure (only show when no one is home)
    if (s.last_departed_at && !isIn) {
      rows.push({
        dot: 'red',
        label: '🚪 Last Departure',
        value: s.last_departed_at
      });
    }

    // Device online status
    rows.push({
      dot: w.connected ? 'green' : 'red',
      label: w.connected ? '📶 Device Online' : '❌ Device Offline',
      value: w.connected ? (w.ssid ? 'Connected to ' + w.ssid : 'Connected') : 'Cannot reach device'
    });

    const html = rows.map(r => `
      <div class="s-row">
        <div class="dot ${r.dot}"></div>
        <div>
          <div class="s-label">${r.label}</div>
          <div class="s-value">${r.value}</div>
        </div>
      </div>
    `).join('') + `
      <button id="refresh-btn" onclick="manualRefresh()">
        <span id="refresh-icon">🔄</span> Refresh
      </button>
    `;

    document.getElementById('status-body').innerHTML = html;

    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('updated').textContent = 'Updated at ' + now;
  }

  function showError() {
    document.getElementById('status-body').innerHTML = `
      <div class="s-row">
        <div class="dot yellow"></div>
        <div>
          <div class="s-label">Could not load status <span style="font-size:0.95rem;font-weight:700;color:var(--orange);">(retry ${failCount})</span></div>
          <div class="s-value">Open the Full Dashboard to check</div>
        </div>
      </div>
      <button id="refresh-btn" onclick="manualRefresh()">
        <span id="refresh-icon">🔄</span> Try Again
      </button>
    `;
  }

  async function manualRefresh() {
    const icon = document.getElementById('refresh-icon');
    if (icon) icon.classList.add('spinning');
    await fetchStatus();
    const icon2 = document.getElementById('refresh-icon');
    if (icon2) icon2.classList.remove('spinning');
  }

  fetchStatus();
  setInterval(fetchStatus, 2000);  // refresh every 2 seconds
</script>

</body>
</html>
